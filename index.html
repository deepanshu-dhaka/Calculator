<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <div class="screen-container"></div>
      <div class="ac-backspace-divide-buttons">
        <button class="ac-button">AC</button>
        <button class="backspace-button">Backspace</button>
        <button class="divide-operator-button">/</button>
      </div>
      <div class="seven-eight-nine-add-buttons">
        <button class="digit-7-button">7</button>
        <button class="digit-8-button">8</button>
        <button class="digit-9-button">9</button>
        <button class="plus-operator-button">+</button>
      </div>
      <div class="four-five-six-subtract-buttons">
        <button class="digit-4-button">4</button>
        <button class="digit-5-button">5</button>
        <button class="digit-6-button">6</button>
        <button class="subtract-operator-button">-</button>
      </div>
      <div class="one-two-three-multiply-buttons">
        <button class="digit-1-button">1</button>
        <button class="digit-2-button">2</button>
        <button class="digit-3-button">3</button>
        <button class="multiply-operator-button">*</button>
      </div>
      <div class="zero-decimal-equalto-buttons">
        <button class="digit-0-button">0</button>
        <button class="decimal-button">.</button>
        <button class="equalto-operator-button">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
