<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <div class="screen-container">
        <p>5985</p>
      </div>
      <div class="ac-backspace-divide-buttons">
        <button id="ac-button">AC</button>
        <button id="backspace-btn">Backspace</button>
        <button id="divide-operator-button">/</button>
      </div>
      <div class="seven-eight-nine-add-buttons">
        <button id="digit-7-button">7</button>
        <button id="digit-8-button">8</button>
        <button id="digit-9-button">9</button>
        <button id="plus-operator-button">+</button>
      </div>
      <div class="four-five-six-subtract-buttons">
        <button id="digit-4-button">4</button>
        <button id="digit-5-button">5</button>
        <button id="digit-6-button">6</button>
        <button id="subtract-operator-button">-</button>
      </div>
      <div class="one-two-three-multiply-buttons">
        <button id="digit-1-button">1</button>
        <button id="digit-2-button">2</button>
        <button id="digit-3-button">3</button>
        <button id="multiply-operator-button">*</button>
      </div>
      <div class="zero-decimal-equalto-buttons">
        <button id="zero-btn">0</button>
        <button id="decimal-button">.</button>
        <button id="equalto-operator-button">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
