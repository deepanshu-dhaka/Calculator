<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <div class="screen-container">
        <p>0</p>
      </div>
      <div class="ac-backspace-divide-buttons">
        <button id="ac-button">AC</button>
        <button id="backspace-btn">Backspace</button>
        <button id="divide-operator-button" class="operator-btn">/</button>
      </div>
      <div class="seven-eight-nine-add-buttons">
        <button id="digit-7-button" class="digit-btn">7</button>
        <button id="digit-8-button" class="digit-btn">8</button>
        <button id="digit-9-button" class="digit-btn">9</button>
        <button id="plus-operator-button" class="operator-btn">+</button>
      </div>
      <div class="four-five-six-subtract-buttons">
        <button id="digit-4-button" class="digit-btn">4</button>
        <button id="digit-5-button" class="digit-btn">5</button>
        <button id="digit-6-button" class="digit-btn">6</button>
        <button id="subtract-operator-button" class="operator-btn">-</button>
      </div>
      <div class="one-two-three-multiply-buttons">
        <button id="digit-1-button" class="digit-btn">1</button>
        <button id="digit-2-button" class="digit-btn">2</button>
        <button id="digit-3-button" class="digit-btn">3</button>
        <button id="multiply-operator-button" class="operator-btn">*</button>
      </div>
      <div class="zero-decimal-equalto-buttons">
        <button id="zero-btn" class="digit-btn">0</button>
        <button id="decimal-button">.</button>
        <button id="equalto-operator-button" class="equalto-btn">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
